name: build MS-Windows

on:
  push:

jobs:

  windows-build-clang:
    name: Windows MSYS2 - clang
    runs-on: windows-2022
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Gather Facts
        id: facts
        run : |
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize -Wrap
          Get-CIMInstance -Class Win32_Processor | Select-Object -Property Name
          Get-CIMInstance Win32_PhysicalMemory | Measure-Object -Property Capacity -Sum | Format-Table @{n="TotalPhysicalMemory";e={$_.Sum}}
          $BUILD_DRIVE = Split-Path $env:GITHUB_WORKSPACE -Qualifier
          echo "drive=$BUILD_DRIVE" >> $env:GITHUB_OUTPUT

      - uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          install: base-devel git mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-ninja mingw-w64-clang-x86_64-pkgconf mingw-w64-clang-x86_64-libunwind mingw-w64-clang-x86_64-libffi mingw-w64-clang-x86_64-z3 mingw-w64-clang-x86_64-python mingw-w64-clang-x86_64-compiler-rt mingw-w64-clang-x86_64-libc++
          update: true
          location: '${{ steps.facts.outputs.drive }}\M'

      - name: Cache Clang/LLVM
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            ${{ github.workspace }}/compiler+runtime/build/llvm-install
          key: clang-${{ runner.os }}-${{ hashFiles('compiler+runtime/bin/build-clang', 'compiler+runtime/third-party/MINGW-packages/mingw-w64-llvm/**') }}
      - name: Build Clang/LLVM
        shell: msys2 {0}
        env:
          MSYSTEM: CLANG64
        run: |
          WS=$(cygpath -u "${{ github.workspace }}")
          if [[ ! -d "$WS/compiler+runtime/build/llvm-install" ]];
          then
            pushd $WS/compiler+runtime
              ./bin/build-clang
            popd
          fi
          ls -al $WS/compiler+runtime/build/llvm-install

  build:
    needs:
      windows-build-clang

    # if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/master'}}
    strategy:
      fail-fast: false
      matrix:
        include: [
          # { msystem: UCRT64, runner: windows-2022},
          { msystem: CLANG64, runner: windows-2022},
          # { msystem: MINGW64, runner: windows-2022},
          # { msystem: MINGW32, runner: windows-2022},
          # { msystem: CLANGARM64, runner: windows-11-arm}
        ]
    name: ${{ matrix.msystem }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Gather Facts
        id: facts
        run : |
          Get-PSDrive -PSProvider FileSystem | Format-Table -AutoSize -Wrap
          Get-CIMInstance -Class Win32_Processor | Select-Object -Property Name
          Get-CIMInstance Win32_PhysicalMemory | Measure-Object -Property Capacity -Sum | Format-Table @{n="TotalPhysicalMemory";e={$_.Sum}}
          $BUILD_DRIVE = Split-Path $env:GITHUB_WORKSPACE -Qualifier
          echo "drive=$BUILD_DRIVE" >> $env:GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          path: temp
          fetch-depth: 0
          filter: blob:none
          persist-credentials: false
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: base-devel curl zip mingw-w64-clang-x86_64-git-lfs mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-dlfcn mingw-w64-clang-x86_64-libffi mingw-w64-clang-x86_64-doctest mingw-w64-clang-x86_64-libzip mingw-w64-clang-x86_64-gc
          update: true
          location: '${{ steps.facts.outputs.drive }}\M'

      - name: Add staging repo
        shell: msys2 {0}
        run: |
          cp /etc/pacman.conf /etc/pacman.conf.bak
          grep -qFx '[staging]' /etc/pacman.conf || sed -i '/^# \[staging\]/,/^$/ s|^# ||g' /etc/pacman.conf

      - name: Update using staging
        run: |
          msys2 -c 'pacman --noconfirm -Suuy'
          msys2 -c 'pacman --noconfirm -Suu'

      - name: Move Checkout
        run: |
          $path = "${{ steps.facts.outputs.drive }}\_"
          If (Test-Path "$path") { rm -r -fo "$path" }
          Move-Item -Path ".\temp" -Destination "$path"

      - name: Cache Clang/LLVM
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: |
            ${{ github.workspace }}/compiler+runtime/build/llvm-install
          key: clang-${{ runner.os }}-${{ hashFiles('compiler+runtime/bin/build-clang', 'compiler+runtime/third-party/MINGW-packages/mingw-w64-llvm/**') }}

      - name: install jank clang64 compiler
        shell: msys2 {0}
        run: |
          cd "$(cygpath '${{ steps.facts.outputs.drive }}/_')"
          cd compiler+runtime
          # ./bin/msys2-clang64-install.sh
          ./bin/build-clang -i
          clang++ --version

      - name: build
        shell: msys2 {0}
        run: |
          cd "$(cygpath '${{ steps.facts.outputs.drive }}/_')"
          cd compiler+runtime
          ./bin/configure -GNinja -DCMAKE_BUILD_TYPE=Release -Djank_test=on
          ./bin/compile

      - name: test
        shell: msys2 {0}
        run: |
          cd "$(cygpath '${{ steps.facts.outputs.drive }}/_')"
          cd compiler+runtime
          build/jank check-health
